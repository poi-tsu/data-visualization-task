<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Dataset: Survival Visual Analytics</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-sankey/0.12.3/d3-sankey.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>泰坦尼克号遇难者数据可视化任务</h1>
    </header>

    <div class="dashboard">
        <div class="card full-width" id="overview-card">
            <h2>不同身份乘客生存率饼图</h2>
            <div class="controls" id="overview-controls">
                <button id="btn-pie-sex" class="active">按性别归类</button>
                <button id="btn-pie-class">按社会阶层归类</button>
                <button id="btn-pie-embarked">按登船路线归类</button>
            </div>
            <div id="overview-chart" class="chart-container" style="height: 500px;"></div>
        </div>

        <div class="card" id="sankey-card">
            <h2>乘客生存流向</h2>
            <div id="sankey-chart" class="chart-container"></div>
        </div>

        <div class="card" id="bubble-card">
            <h2>个体聚类气泡图</h2>
            <p class="subtitle" style="margin-bottom: 15px;">
                <strong>气泡大小</strong>：代表该乘客的同行家属数量（气泡越巨大，说明拖家带口的人数越多；气泡越小，大概率是独自旅行）。
            </p>
            <div class="controls">
                <button id="btn-all" class="active">综合分布</button>
                <button id="btn-survived">按生还状态聚类</button>
                <button id="btn-class">按客舱等级聚类</button>
            </div>
            <div id="bubble-chart" class="chart-container"></div>
        </div>
    </div>

    <div id="tooltip" class="tooltip" style="opacity: 0;"></div>

    <script src="visualization.js"></script>
</body>
</html>
